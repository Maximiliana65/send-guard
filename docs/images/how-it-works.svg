<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Send Guardの使い方の流れ</title>
<desc>Enterキーや送信ボタンを押した時、ロック中なら改行になり、解除中なら送信されて自動的に再ロックされる流れを示す図。アイコンクリックまたはショートカットで解除できる。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="190" y="40" width="300" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="64" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Enter または 送信ボタン</text>
<text x="340" y="86" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Claude・ChatGPT・Geminiで共通</text>

<line x1="260" y1="104" x2="200" y2="170" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="104" x2="485" y2="170" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="170" width="220" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="200" y="194" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">ロック中(通常)</text>
<text x="200" y="216" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">改行が入るだけ</text>

<rect x="370" y="170" width="230" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="485" y="194" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">解除中(1回だけ)</text>
<text x="485" y="216" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">送信 → 自動で再ロック</text>

<line x1="460" y1="300" x2="485" y2="234" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="310" y="300" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="460" y="320" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">アイコンクリック / Ctrl+Shift+U</text>
<text x="460" y="340" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">次の1回だけ解除</text>
</svg>
